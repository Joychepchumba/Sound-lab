<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Audio Player</title>
  <style>
    body { font-family: Arial; text-align: center; margin-top: 60px; background: #f0f0f0; }
    button { padding: 4px; border: none; background: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; font-size: 11px; color: #555; }
    button img { width: 40px; height: 40px; }
    #headphone { width: 80px; margin-bottom: 10px; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .bouncing { animation: bounce 0.6s infinite; }
    .row { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 10px 0; }
    .controls { display: flex; justify-content: center; align-items: center; gap: 24px; margin: 20px auto; }
    .card { background: white; border: 3px solid black; border-radius: 20px; display: inline-block; padding: 40px 60px; width: 360px; }
    #fileInput { display: none; }
    .file-btn { display: inline-block; padding: 8px 20px; background: black; color: white; border-radius: 8px; cursor: pointer; font-size: 13px; margin-bottom: 8px; }
  </style>
</head>
<body style="display:flex; justify-content:center;">

  <div class="card">
    <img id="headphone" src="assets/headphone_5744158.png">
    <h2>Audio Player</h2>

    <label class="file-btn">Choose File <input type="file" id="fileInput" accept="audio/*"></label>
    <p id="fileName" style="font-size:12px; color:#888;">No file chosen</p>

    <div class="controls">
      <button onclick="audio.currentTime -= 10"><img src="assets/back_2486524.png"> Back</button>
      <button onclick="audio.play()"><img src="assets/play_2486511.png"> Play</button>
      <button onclick="audio.pause()"><img src="assets/pause_2486492.png"> Pause</button>
      <button onclick="audio.currentTime += 10"><img src="assets/next_2486521.png"> Forward</button>
      <button onclick="audio.muted = !audio.muted"><img src="assets/freepik_assistant_1776668058430.png"> Mute</button>
      <button onclick="audio.loop = !audio.loop"><img src="assets/loop_13101684.png"> Loop</button>
    </div>

    <div class="row">
      <label>Volume: <input type="range" min="0" max="1" step="0.1" value="1" style="width:160px" onchange="audio.volume = this.value"></label>
      <label>Speed:
        <select onchange="audio.playbackRate = this.value">
          <option value="0.5">0.5x</option>
          <option value="1" selected>1x</option>
          <option value="1.5">1.5x</option>
          <option value="2">2x</option>
        </select>
      </label>
    </div>

    <p id="time">0:00 / 0:00</p>
  </div>

  <audio id="audio"></audio>

  <script>
    var hp = document.getElementById("headphone");

    document.getElementById("fileInput").addEventListener("change", function() {
      audio.src = URL.createObjectURL(this.files[0]);
      document.getElementById("fileName").textContent = this.files[0].name;
    });

    audio.addEventListener("play",  function() { hp.classList.add("bouncing"); });
    audio.addEventListener("pause", function() { hp.classList.remove("bouncing"); });
    audio.addEventListener("ended", function() { hp.classList.remove("bouncing"); });

    audio.addEventListener("timeupdate", function() {
      var c = Math.floor(audio.currentTime), t = Math.floor(audio.duration);
      document.getElementById("time").textContent =
        Math.floor(c/60) + ":" + String(c%60).padStart(2,"0") + " / " +
        Math.floor(t/60) + ":" + String(t%60).padStart(2,"0");
    });
  </script>

</body>
</html>
